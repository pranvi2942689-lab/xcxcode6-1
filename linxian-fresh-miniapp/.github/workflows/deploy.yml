name: Deploy Miniapp Server

on:
  push:
    branches: [ "main" ] # 监听 main 分支的提交

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. 登录腾讯云镜像仓库
      - name: Login to Tencent Registry
        uses: docker/login-action@v2
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      # 2. 打包并推送 Docker 镜像 (这里会用到你根目录的 Dockerfile)
      - name: Build and Push Docker Image
        run: |
          docker build -t ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest .
          docker push ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest

      # 3. SSH 登录服务器，拉取镜像并重启
      - name: Deploy to Tencent Cloud Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root # 我们直接用 root 权限执行，省去 sudo 的麻烦
          # 下面这行很重要：如果你用密码登录服务器，请把 key: 改成 password:
          password: ${{ secrets.SERVER_PASSWORD }} 
          script: |
            cd /opt/miniapp-server
            docker login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASS }} ccr.ccs.tencentyun.com
            docker-compose pull backend
            docker-compose up -d --remove-orphans
            docker image prune -f