

name: Deploy Miniapp Server

on:
  push:
    branches: [ "main" ] # 确保你推送的分支名是 main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. 登录腾讯云镜像仓库
      - name: Login to Tencent Registry
        uses: docker/login-action@v2
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      # 2. 打包并推送到你的 my-studio 镜像仓库
      - name: Build and Push Docker Image
        run: |
          docker build -t ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest .
          docker push ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest

      # 3. 自动 SSH 登录你的服务器，拉取最新镜像并重启
      - name: Deploy to Tencent Cloud Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu # 你的服务器账号
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/miniapp-server
            docker login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASS }} ccr.ccs.tencentyun.com
            docker-compose pull backend
            docker-compose up -d --remove-orphans
            docker image prune -f # 清理旧镜像释放空间