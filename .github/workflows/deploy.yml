name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Tencent TCR
        # 这里用你的账号密码登录腾讯云
        run: echo "${{ secrets.REGISTRY_PASS }}" | docker login ccr.ccs.tencentyun.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build Docker Image
        # 打包镜像，明确使用正确的腾讯云 TCR 网址
        run: docker build -t ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest .

      - name: Push Docker Image
        # 把打包好的镜像推送到腾讯云
        run: docker push ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        # 【关键修复】通过 env 把机密变量安全地传过去，防止特殊符号变乱码
        env:
          USER_NAME: ${{ secrets.REGISTRY_USER }}
          USER_PASS: ${{ secrets.REGISTRY_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASS }}
          envs: USER_NAME,USER_PASS
          script: |
            # 使用转交过来的安全变量进行登录
            docker login ccr.ccs.tencentyun.com -u "$USER_NAME" -p "$USER_PASS"
            docker pull ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest
            docker stop miniapp-server || true
            docker rm miniapp-server || true
            docker run -d --name miniapp-server -p 3000:3000 ccr.ccs.tencentyun.com/my-studio/miniapp-server:latest